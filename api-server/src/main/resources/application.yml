server:
  port: 8080
  servlet:
    session:
      cookie:
        name: JSESSIONID

spring:
  application:
    name: api-server
  datasource:
    url: jdbc:mysql://localhost:3306/talk?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
  session:
    redis:
      namespace: spring:session
  data:
    redis:
      host: localhost
      port: 6379