server:
  port: 8081
  instanceId: 1
  servlet:
    session:
      cookie:
        name: JSESSIONID

spring:
  application:
    name: chat-server
  datasource:
    url: jdbc:mysql://localhost:3306/talk?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
  session:
    redis:
      namespace: spring:session