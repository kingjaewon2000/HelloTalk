version: '3.8'

services:
  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    image: ${API_IMAGE_TAG:-hellow-talk-api:latest}
    container_name: api_server
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${SERVER2_IP}:3306/chat_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_ROOT_PASSWORD}
      SPRING_REDIS_HOST: ${SERVER2_IP}
      SPRING_REDIS_PORT: 6379
    networks:
      - app_network

  chat-server:
    build:
      context: ./chat-server
      dockerfile: Dockerfile
    image: ${CHAT_IMAGE_TAG:-hellow-talk-chat:latest}
    container_name: chat_server
    restart: unless-stopped
    expose:
      - "8081"
    environment:
      SPRING_REDIS_HOST: ${SERVER2_IP}
      SPRING_REDIS_PORT: 6379
    networks:
      - app_network

  consumer-server:
    build:
      context: ./consumer-server
      dockerfile: Dockerfile
    image: ${CONSUMER_IMAGE_TAG:-hellow-talk-consumer:latest}
    container_name: consumer_server
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${SERVER2_IP}:3306/chat_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_ROOT_PASSWORD}
      SPRING_REDIS_HOST: ${SERVER2_IP}
      SPRING_REDIS_PORT: 6379
    networks:
      - app_network

  nginx:
    image: nginx:latest
    container_name: nginx_gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_network
    depends_on:
      - api-server
      - chat-server

networks:
  app_network:
    driver: bridge